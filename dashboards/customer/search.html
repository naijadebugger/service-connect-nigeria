<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Artisans | ServiceConnect</title>
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/customer-dashboard.css">
</head>
<body class="dashboard-container">

  <aside class="sidebar">
    <div>
      <div class="brand-logo">
        ServiceConnect<span class="brand-accent">.ng</span>
      </div>
      
      <nav class="nav-list">
        <a href="#" class="nav-item active">🔍 Find Artisans</a>
        <a href="booking.html" class="nav-item">📅 My Bookings</a>
        <a href="#" class="nav-item">⚙️ Settings</a>
      </nav>
    </div>

    <div style="border-top: 1px solid #E2E8F0; padding-top: 1rem; display: flex; align-items: center; gap: 0.75rem;">
      <div style="width: 40px; height: 40px; background: #0F172A; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">C</div>
      <div>
        <div style="font-size: 0.875rem; font-weight: 600; color: #1E293B;">Customer Workspace</div>
        <a href="../../index.html" style="font-size: 0.75rem; color: #64748B; text-decoration: none;">Log Out</a>
      </div>
    </div>
  </aside>

  <main style="flex: 1; padding: 2.5rem; max-width: 1200px; margin: 0 auto; width: 100%;">
    
    <header style="margin-bottom: 2rem;">
      <h1 style="font-size: 1.75rem; color: #0F172A; font-weight: 800; tracking: -0.02em; margin-bottom: 0.5rem;">Find Verified Professionals</h1>
      <p style="color: #64748B; font-size: 0.95rem;">Book certified artisans in your localized area with absolute security.</p>
    </header>

    <section class="search-filter-card">
      <input type="text" class="input-field" placeholder="What service do you need? (e.g., Plumber, Carpenter)">
      <input type="text" class="input-field" placeholder="Enter neighborhood or state">
      <button class="btn-search">Search</button>
    </section>

    <section>
      <h2 style="font-size: 1.125rem; color: #0F172A; font-weight: 700; margin-bottom: 1.25rem;">Artisans in Your Area</h2>
      
      <div class="artisan-grid">
        <div class="artisan-card">
          <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem;">
            <div style="font-size: 1.5rem; background: #F1F5F9; padding: 0.5rem; border-radius: 0.5rem;">👨‍🔧</div>
            <span class="badge-verified">VERIFIED</span>
          </div>
          <h3 style="font-size: 1.125rem; color: #0F172A; font-weight: 700; margin-bottom: 0.25rem;">Tunde Adebayo</h3>
          <p style="color: #10B981; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.75rem;">Master Electrician</p>
          <div style="font-size: 0.75rem; color: #64748B;">
            <span>⭐ 4.9 (48 reviews)</span> • <span>Nsukka, Enugu</span>
          </div>
          <button class="btn-profile">View Profile & Book</button>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
